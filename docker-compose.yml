services:
  postgres:
    image: postgres:17-alpine
    container_name: project-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-project_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: project-redis
    restart: always
    ports:
      - "6379:6379"

  mailhog:
    image: mailhog/mailhog
    container_name: project-mailhog
    restart: always
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: project-api
    restart: always
    env_file:
      - ./apps/api/.env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=${DB_NAME:-project_db};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-postgres}
      - Redis__Configuration=redis:6379
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - SMTP_FROM=no-reply@project.com
    ports:
      - "5000:8080"
    depends_on:
      - postgres
      - redis
    volumes:
      - api_uploads:/app/wwwroot/uploads

volumes:
  postgres_data:
  api_uploads:
